# =============================================================================
# Tidemark Intercept — Quickstart
# =============================================================================
#
# One-line install (generates secure credentials automatically):
#
#   curl -fsSL https://go.tidemarksecurity.com/tmi | bash
#
# Or manually:
#   1. Download this file and .env.example
#   2. Copy .env.example to .env and fill in values
#   3. docker compose up -d
#
# Then open http://localhost and log in:
#   Username: admin    Password: admin
#
# Default ports:
#   80    — Frontend UI
#   8000  — Backend API
#   9001  — MinIO Console (object storage admin)
#   7860  — Langflow AI Designer
#
# Override the image version:
#   TAG=0.1.0 docker compose up -d
#
# ⚠️  This configuration is for evaluation and local testing.
# For production, use a proper secrets manager and enable HTTPS.
# =============================================================================

configs:
  db-init:
    content: |
      -- Tidemark Intercept — database bootstrap
      -- Creates extensions and Langflow databases on first volume creation.

      -- Langflow user and databases
      DO $$$$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'langflow_user') THEN
              CREATE ROLE langflow_user WITH LOGIN PASSWORD '${LANGFLOW_DB_PASSWORD}';
          END IF;
      END $$$$;

      SELECT 'CREATE DATABASE langflow OWNER langflow_user'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'langflow')\gexec

      SELECT 'CREATE DATABASE langflow_rag OWNER langflow_user'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'langflow_rag')\gexec

      GRANT ALL PRIVILEGES ON DATABASE langflow TO langflow_user;
      GRANT ALL PRIVILEGES ON DATABASE langflow_rag TO langflow_user;

      -- Extensions for the main app database
      CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
      CREATE EXTENSION IF NOT EXISTS "pg_trgm";
      CREATE EXTENSION IF NOT EXISTS vector;

  db-init-pgcron:
    content: |
      -- pg_cron extension setup (requires superuser)
      \c postgres
      CREATE EXTENSION IF NOT EXISTS pg_cron;

  db-init-pgvector:
    content: |
      -- pgvector in langflow_rag database
      \c langflow_rag
      CREATE EXTENSION IF NOT EXISTS vector;

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — with pgvector + pg_cron
  # ---------------------------------------------------------------------------
  postgres:
    image: ghcr.io/tidemark-security/intercept-postgres:${TAG:-latest}
    environment:
      POSTGRES_DB: intercept_case_db
      POSTGRES_USER: intercept_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - tmi_qs_postgres_data:/var/lib/postgresql/data
    configs:
      - source: db-init
        target: /docker-entrypoint-initdb.d/01-init.sql
      - source: db-init-pgcron
        target: /docker-entrypoint-initdb.d/02-init-pgcron.sql
      - source: db-init-pgvector
        target: /docker-entrypoint-initdb.d/03-init-pgvector.sql
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intercept_user -d intercept_case_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for file attachments
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - tmi_qs_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb minio/intercept-attachments --ignore-existing;
      mc anonymous set none minio/intercept-attachments;
      echo 'MinIO bucket initialized successfully';
      exit 0;
      "

  # ---------------------------------------------------------------------------
  # Backend API — FastAPI application with auto-migration and user seeding
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/tidemark-security/intercept-backend:${TAG:-latest}
    extra_hosts:
      - "localhost:host-gateway"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://intercept_user:${POSTGRES_PASSWORD}@localhost:5432/intercept_case_db
      SECRET_KEY: ${SECRET_KEY}
      SESSION_COOKIE_SECURE: "false"               # Set to "true" when using HTTPS
      STORAGE_ENDPOINT: localhost:9000
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_BUCKET: intercept-attachments
      STORAGE_USE_SSL: "false"
      LANGFLOW__BASE_URL: http://localhost:7860/api/v1
      LANGFLOW__API_KEY: ${LANGFLOW_API_KEY}
      AUTO_SEED: "true"                            # Creates admin/admin user on first boot
      CORS_ORIGINS: '["http://localhost"]'         # Adjust for production (e.g. "https://example.com")
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Background Worker — async job processing (enrichment, notifications, etc.)
  # ---------------------------------------------------------------------------
  worker:
    image: ghcr.io/tidemark-security/intercept-worker:${TAG:-latest}
    extra_hosts:
      - "localhost:host-gateway"
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://intercept_user:${POSTGRES_PASSWORD}@localhost:5432/intercept_case_db
      SECRET_KEY: ${SECRET_KEY}
      STORAGE_ENDPOINT: localhost:9000
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_BUCKET: intercept-attachments
      STORAGE_USE_SSL: "false"
      LANGFLOW__BASE_URL: http://localhost:7860/api/v1
      LANGFLOW__API_KEY: ${LANGFLOW_API_KEY}
      WORKER_CONCURRENCY: "20"
      HEALTH_PORT: "8001"
      LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — React SPA served by nginx
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/tidemark-security/intercept-frontend:${TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Langflow — AI/LLM orchestration platform (optional — AI features)
  # ---------------------------------------------------------------------------
  langflow:
    image: langflowai/langflow:1.8.3
    user: root
    environment:
      LANGFLOW_DATABASE_URL: postgresql://langflow_user:${LANGFLOW_DB_PASSWORD}@postgres:5432/langflow
      LANGFLOW_PGVECTOR_DATABASE_URL: postgresql://langflow_user:${LANGFLOW_DB_PASSWORD}@postgres:5432/langflow_rag
      LANGFLOW_VARIABLES_TO_GET_FROM_ENVIRONMENT: "LANGFLOW_PGVECTOR_DATABASE_URL"
      LANGFLOW_CONFIG_DIR: /app/langflow
      LANGFLOW_AUTO_LOGIN: "false"
      LANGFLOW_SUPERUSER: ${LANGFLOW_SUPERUSER:-admin}
      LANGFLOW_SUPERUSER_PASSWORD: ${LANGFLOW_SUPERUSER_PASSWORD}
      LANGFLOW_SECRET_KEY: ${LANGFLOW_SECRET_KEY}
      LANGFLOW_NEW_USER_IS_ACTIVE: "false"
      LANGFLOW_ENABLE_SUPERUSER_CLI: "false"
      LANGFLOW_API_KEY_SOURCE: env
      LANGFLOW_API_KEY: ${LANGFLOW_API_KEY}
      DO_NOT_TRACK: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPIK_API_KEY: ${OPIK_API_KEY:-}
      OPIK_URL_OVERRIDE: ${OPIK_URL_OVERRIDE:-}
      OPIK_PROJECT_NAME: ${OPIK_PROJECT_NAME:-}
      OPIK_WORKSPACE: ${OPIK_WORKSPACE:-}
    extra_hosts:
      - "localhost:host-gateway"
    ports:
      - "7860:7860"
    volumes:
      - tmi_qs_langflow_data:/app/langflow
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tmi_qs_postgres_data:
  tmi_qs_minio_data:
  tmi_qs_langflow_data:
