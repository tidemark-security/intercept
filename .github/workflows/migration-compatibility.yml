name: Migration Compatibility

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/migration-compatibility.yml"
      - "scripts/test-migration-compatibility.sh"
      - "backend/alembic.ini"
      - "backend/db_migrations/**"
      - "backend/app/models/**"
      - "backend/init*.sql"
      - "backend/Dockerfile"
      - "backend/Dockerfile.postgres"
      - "backend/entrypoint.sh"
      - "docs/database-schema-management.md"
  workflow_dispatch:
    inputs:
      n_minus_1_tag:
        description: "Previous released image tag to test from, without leading v. Defaults to latest v* tag on main."
        required: false
        type: string
      run_rollback_smoke:
        description: "Also start N-1 backend/frontend against the upgraded DB."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: read

env:
  IMAGE_PREFIX: ghcr.io/tidemark-security
  CANDIDATE_BACKEND_IMAGE: intercept-backend:migration-candidate

jobs:
  migration-compatibility:
    name: N-1 to PR Migration Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve previous release tag
        id: previous-release
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.n_minus_1_tag || '' }}
        run: |
          set -euo pipefail
          if [[ -n "$REQUESTED_TAG" ]]; then
            tag="${REQUESTED_TAG#v}"
          else
            git fetch --tags origin '+refs/heads/main:refs/remotes/origin/main'
            latest_git_tag="$(git tag --merged origin/main --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
            if [[ -z "$latest_git_tag" ]]; then
              echo "::error::No semver release tag found on origin/main. Provide n_minus_1_tag manually."
              exit 1
            fi
            tag="${latest_git_tag#v}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using N-1 image tag: $tag"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build candidate backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.CANDIDATE_BACKEND_IMAGE }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Run migration compatibility harness
        env:
          N_MINUS_1_TAG: ${{ steps.previous-release.outputs.tag }}
          RUN_ROLLBACK_SMOKE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_rollback_smoke || false }}
        run: ./scripts/test-migration-compatibility.sh
