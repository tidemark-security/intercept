version: '3.8'

services:
  postgres:
    build:
      context: ./backend
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_DB: intercept_case_db
      POSTGRES_USER: intercept_user
      POSTGRES_PASSWORD: intercept_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/init-pgcron.sql:/docker-entrypoint-initdb.d/02-init-pgcron.sql
      - ./backend/init-pgvector.sql:/docker-entrypoint-initdb.d/03-init-pgvector.sql
    command: 
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intercept_user -d intercept_case_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql+asyncpg://intercept_user:intercept_password@postgres:5432/intercept_case_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: intercept-attachments
      MINIO_USE_SSL: "false"
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      ADMIN_API_KEY: dev-admin-key-change-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc mb minio/intercept-attachments --ignore-existing;
      mc anonymous set none minio/intercept-attachments;
      echo 'MinIO bucket initialized successfully';
      exit 0;
      "

  langflow:
    image: langflowai/langflow:latest
    user: root
    environment:
      LANGFLOW_DATABASE_URL: postgresql://langflow_user:langflow_password@postgres:5432/langflow
      LANGFLOW_CONFIG_DIR: /app/langflow
      DO_NOT_TRACK: "true"
    ports:
      - "7860:7860"
    volumes:
      - langflow_data:/app/langflow
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql+asyncpg://intercept_user:intercept_password@postgres:5432/intercept_case_db
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      WORKER_CONCURRENCY: "20"
      HEALTH_PORT: "8001"
      LOG_LEVEL: "INFO"
    ports:
      - "8001:8001"  # Health/metrics endpoint
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "worker.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  langflow_data:
